kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: shopwave-cluster
nodes:
  - role: control-plane
    # Required label so nginx ingress controller targets this node.
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # Ingress HTTP — http://localhost/
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      # Ingress HTTPS — https://localhost/
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      # Legacy NodePort — http://localhost:30080/
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
