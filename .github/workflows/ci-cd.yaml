name: CI/CD Pipeline to GitOps

# ─── ADDED PERMISSIONS ──────────────────────────────────────────
permissions:
  id-token: write # Required for requesting the JWT for OIDC (if using GitHub OIDC to AWS)
  contents: read  # Required for actions/checkout

on:
  push:
    branches:
      - main
    # Only trigger if code in these folders changes (saves Action minutes!)
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/**'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: BUILD, TRIVY SCAN, AND PUSH TO AMAZON ECR
  # ─────────────────────────────────────────────────────────────────────────
  build-scan-push:
    name: Build, Scan & Push to ECR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─── FRONTEND ─────────────────────────────────────────────────────────
      - name: Build Frontend Image (Local)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          load: true # Load into local docker daemon so Trivy can scan it
          tags: ${{ steps.login-ecr.outputs.registry }}/shopwave-frontend:v1.0.${{ github.run_number }}

      - name: Trivy Scan Frontend (Vulnerabilities & Secrets)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/shopwave-frontend:v1.0.${{ github.run_number }}'
          format: 'table'
          exit-code: '0' # Warnings only
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln,secret'

      - name: Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/shopwave-frontend:v1.0.${{ github.run_number }}
            ${{ steps.login-ecr.outputs.registry }}/shopwave-frontend:latest

      # ─── BACKEND ──────────────────────────────────────────────────────────
      - name: Build Backend Image (Local)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: ${{ steps.login-ecr.outputs.registry }}/shopwave-backend:v1.0.${{ github.run_number }}

      - name: Trivy Scan Backend (Vulnerabilities & Secrets)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/shopwave-backend:v1.0.${{ github.run_number }}'
          format: 'table'
          exit-code: '0' # Warnings only
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln,secret'

      - name: Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/shopwave-backend:v1.0.${{ github.run_number }}
            ${{ steps.login-ecr.outputs.registry }}/shopwave-backend:latest

  # The update-gitops job was removed because ArgoCD Image Updater 
  # now automatically watches ECR for new images and applies them to the cluster!
