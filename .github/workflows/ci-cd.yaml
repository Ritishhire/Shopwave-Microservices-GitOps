name: CI/CD Pipeline to GitOps

# ─── ADDED PERMISSIONS ──────────────────────────────────────────
# This gives GitHub Actions the right to push the new commit
permissions:
  contents: write

on:
  push:
    branches:
      - main
    # Only trigger if code in these folders changes (saves Action minutes!)
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/**'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: BUILD, TRIVY SCAN, AND PUSH TO DOCKER HUB
  # ─────────────────────────────────────────────────────────────────────────
  build-scan-push:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ─── FRONTEND ─────────────────────────────────────────────────────────
      - name: Build Frontend Image (Local)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          load: true # Load into local docker daemon so Trivy can scan it
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-frontend:1.0.${{ github.run_number }}

      - name: Trivy Scan Frontend (Vulnerabilities & Secrets)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-frontend:1.0.${{ github.run_number }}'
          format: 'table'
          exit-code: '0' # Changed to 0 so it only warns, instead of failing the pipeline
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln,secret'

      - name: Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-frontend:1.0.${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-frontend:latest

      # ─── BACKEND ──────────────────────────────────────────────────────────
      - name: Build Backend Image (Local)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-backend:1.0.${{ github.run_number }}

      - name: Trivy Scan Backend (Vulnerabilities & Secrets)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-backend:1.0.${{ github.run_number }}'
          format: 'table'
          exit-code: '0' # Changed to 0 so it only warns
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln,secret'

      - name: Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-backend:1.0.${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-backend:latest


