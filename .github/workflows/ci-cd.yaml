name: CI/CD Pipeline to GitOps

# ─── ADDED PERMISSIONS ──────────────────────────────────────────
# This gives GitHub Actions the right to push the new commit
permissions:
  contents: write

on:
  push:
    branches:
      - main
    # Only trigger if code in these folders changes (saves Action minutes!)
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/**'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: BUILD, TRIVY SCAN, AND PUSH TO DOCKER HUB
  # ─────────────────────────────────────────────────────────────────────────
  build-scan-push:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ─── FRONTEND ─────────────────────────────────────────────────────────
      - name: Build Frontend Image (Local)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          load: true # Load into local docker daemon so Trivy can scan it
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-frontend:v${{ github.run_number }}

      - name: Trivy Scan Frontend (Vulnerabilities & Secrets)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-frontend:v${{ github.run_number }}'
          format: 'table'
          exit-code: '0' # Changed to 0 so it only warns, instead of failing the pipeline
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln,secret'

      - name: Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-frontend:v${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-frontend:latest

      # ─── BACKEND ──────────────────────────────────────────────────────────
      - name: Build Backend Image (Local)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-backend:v${{ github.run_number }}

      - name: Trivy Scan Backend (Vulnerabilities & Secrets)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-backend:v${{ github.run_number }}'
          format: 'table'
          exit-code: '0' # Changed to 0 so it only warns
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln,secret'

      - name: Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-backend:v${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-backend:latest

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: UPDATE GITOPS REPO (HELM VALUES) & COMMIT
  # ─────────────────────────────────────────────────────────────────────────
  update-gitops:
    name: Update GitOps Repository
    needs: build-scan-push # Only runs if build, scan, and push were 100% successful
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Helm Values with new Image Tags
        env:
          SHA: v${{ github.run_number }}
        run: |
          # Use yq to safely update the tag values in helm/shopwave/values.yaml
          yq e -i '.backend.image.tag = env(SHA) | .frontend.image.tag = env(SHA)' helm/shopwave/values.yaml

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/shopwave/values.yaml
          # [skip ci] prevents the commit from triggering another action loop!
          git commit -m "ci: Update image tags to v${{ github.run_number }} [skip ci]"
          git push origin main
