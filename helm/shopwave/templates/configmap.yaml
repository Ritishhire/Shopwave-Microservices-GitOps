---
# ConfigMap — shared non-sensitive app settings
apiVersion: v1
kind: ConfigMap
metadata:
  name: shopwave-config
  namespace: {{ include "shopwave.namespace" . }}
  labels:
    {{- include "shopwave.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.backend.nodeEnv | quote }}
  PORT: {{ .Values.backend.port | toString | quote }}
  MONGO_INITDB_DATABASE: {{ .Values.mongo.database | quote }}
  MONGO_URI: {{ include "shopwave.mongoUri" . | quote }}
  JWT_EXPIRE: {{ .Values.backend.jwtExpire | quote }}
---
# Secret — sensitive values (override jwtSecret in production!)
apiVersion: v1
kind: Secret
metadata:
  name: shopwave-secret
  namespace: {{ include "shopwave.namespace" . }}
  labels:
    {{- include "shopwave.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
