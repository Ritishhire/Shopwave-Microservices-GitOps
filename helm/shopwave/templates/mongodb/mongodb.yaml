---
# ── MongoDB ClusterIP Service ─────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: {{ include "shopwave.namespace" . }}
  labels:
    {{- include "shopwave.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  selector:
    {{- include "shopwave.selectorLabels" (dict "root" . "component" "database") | nindent 4 }}
  ports:
    - name: mongo
      port: 27017
      targetPort: mongo
---
# ── MongoDB StatefulSet ───────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: {{ include "shopwave.namespace" . }}
  labels:
    {{- include "shopwave.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  serviceName: mongo
  replicas: {{ .Values.mongo.replicas }}
  selector:
    matchLabels:
      {{- include "shopwave.selectorLabels" (dict "root" . "component" "database") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "shopwave.selectorLabels" (dict "root" . "component" "database") | nindent 8 }}
    spec:
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      containers:
        - name: mongo
          image: "{{ .Values.mongo.image.repository }}:{{ .Values.mongo.image.tag }}"
          imagePullPolicy: {{ .Values.mongo.image.pullPolicy }}
          ports:
            - name: mongo
              containerPort: 27017
          env:
            - name: MONGO_INITDB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: shopwave-config
                  key: MONGO_INITDB_DATABASE
          # ── Health Checks ─────────────────────────────────────────────────
          startupProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
            initialDelaySeconds: {{ .Values.mongo.probes.startup.initialDelaySeconds }}
            failureThreshold: {{ .Values.mongo.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.mongo.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.mongo.probes.startup.timeoutSeconds }}
            successThreshold: 1
          readinessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
            periodSeconds: {{ .Values.mongo.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.mongo.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.mongo.probes.readiness.failureThreshold }}
            successThreshold: {{ .Values.mongo.probes.readiness.successThreshold }}
          livenessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
            periodSeconds: {{ .Values.mongo.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.mongo.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.mongo.probes.liveness.failureThreshold }}
            successThreshold: 1
          # ── Resource Limits ───────────────────────────────────────────────
          resources:
            requests:
              cpu: {{ .Values.mongo.resources.requests.cpu }}
              memory: {{ .Values.mongo.resources.requests.memory }}
            limits:
              cpu: {{ .Values.mongo.resources.limits.cpu }}
              memory: {{ .Values.mongo.resources.limits.memory }}
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.mongo.storage }}
