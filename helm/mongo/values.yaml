global:
  namespace: shopwave

mongo:
  image:
    repository: mongo
    tag: "7"
    pullPolicy: Always
  replicas: 1
  database: shopwave
  storage: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  probes:
    startup:
      initialDelaySeconds: 15
      failureThreshold: 30
      periodSeconds: 5
      timeoutSeconds: 3
    readiness:
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
      successThreshold: 2
    liveness:
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
