apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
data:

  # ─── GMAIL SMTP SERVICE INTEGRATION ──────────────────────────────
  service.email: |
    host: smtp.gmail.com
    port: 587
    from: ritishhire179@gmail.com
    username: ritishhire179@gmail.com
    password: $email-password

  # ─── TRIGGER CONDITIONS ─────────────────────────────────────────
  # FIX 2: health bhi check ho rahi hai — "SYNCED & HEALTHY" badge accurate hoga
  trigger.on-sync-succeeded: |
    - when: app.status.sync.status == 'Synced' and app.status.health.status == 'Healthy'
      send: [app-sync-succeeded]

  trigger.on-sync-failed: |
    - when: app.status.operationState != nil and app.status.operationState.phase in ['Failed', 'Error']
      send: [app-sync-failed]

  trigger.on-health-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [app-health-degraded]

  # ─── EMAIL NOTIFICATION TEMPLATES ──────────────────────────────
  template.app-sync-succeeded: |
    email:
      subject: "✅ [ArgoCD] App '{{.app.metadata.name}}' Synced Successfully"
      html: |
        <!DOCTYPE html>
        <html>
        <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <style>
            body { margin: 0; padding: 0; background-color: #0b0c10; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #c5c6c7; }
            .container { max-width: 600px; margin: 40px auto; background: linear-gradient(145deg, #1f2833, #151a21); border: 1px solid #1f2833; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }
            .header { background: linear-gradient(135deg, #10b981, #059669); padding: 35px 20px; text-align: center; }
            .header h1 { margin: 0; color: #ffffff; font-size: 22px; font-weight: 800; letter-spacing: 0.5px; text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2); }
            .header p { margin: 10px 0 0; color: rgba(255, 255, 255, 0.9); font-size: 14px; }
            .content { padding: 30px; }
            .status-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; background-color: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
            .details-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; background-color: rgba(0, 0, 0, 0.2); border-radius: 8px; overflow: hidden; }
            .details-table td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid #1f2833; }
            .details-table tr:last-child td { border-bottom: none; }
            .details-label { color: #66fcf1; font-weight: 600; width: 35%; }
            .details-value { color: #ffffff; font-family: monospace; font-size: 13px; word-break: break-all; }
            .btn-container { text-align: center; margin-top: 30px; }
            .btn { display: inline-block; padding: 14px 32px; background: linear-gradient(135deg, #66fcf1, #45a29e); color: #0b0c10 !important; text-decoration: none; font-weight: 700; border-radius: 30px; font-size: 14px; box-shadow: 0 4px 15px rgba(102, 252, 241, 0.3); text-transform: uppercase; }
            .footer { text-align: center; padding: 20px; font-size: 11px; color: #45a29e; border-top: 1px solid #1f2833; background-color: #0a0b0f; }
          </style>
        </head>
        <body>
          <div class="container">
            <div class="header">
              <h1>✅ APP SYNCED SUCCESSFULLY</h1>
              <p>Application <strong>{{.app.metadata.name}}</strong> is up-to-date and healthy.</p>
            </div>
            <div class="content">
              <div style="text-align: center;">
                <span class="status-badge">SYNCED &amp; HEALTHY</span>
              </div>
              <table class="details-table">
                <tr>
                  <td class="details-label">Sync Status</td>
                  <td class="details-value" style="color: #10b981; font-weight: bold;">{{.app.status.sync.status}}</td>
                </tr>
                <tr>
                  <td class="details-label">Health Status</td>
                  <td class="details-value" style="color: #10b981; font-weight: bold;">{{.app.status.health.status}}</td>
                </tr>
                <tr>
                  <td class="details-label">Target Revision</td>
                  <td class="details-value">{{.app.spec.source.targetRevision}}</td>
                </tr>
                <tr>
                  <td class="details-label">Cluster</td>
                  <td class="details-value">{{.app.spec.destination.server}}</td>
                </tr>
                <tr>
                  <td class="details-label">Namespace</td>
                  <td class="details-value">{{.app.spec.destination.namespace}}</td>
                </tr>
              </table>
              <div class="btn-container">
                <a href="{{.context.argocdUrl}}/applications/{{.app.metadata.name}}" class="btn">View in Argo CD</a>
              </div>
            </div>
            <div class="footer">
              Automated GitOps notification from Argo CD Server
            </div>
          </div>
        </body>
        </html>

  template.app-sync-failed: |
    email:
      subject: "❌ [ArgoCD] App '{{.app.metadata.name}}' Sync FAILED!"
      html: |
        <!DOCTYPE html>
        <html>
        <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <style>
            body { margin: 0; padding: 0; background-color: #0b0c10; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #c5c6c7; }
            .container { max-width: 600px; margin: 40px auto; background: linear-gradient(145deg, #1f2833, #151a21); border: 1px solid #1f2833; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }
            .header { background: linear-gradient(135deg, #ef4444, #dc2626); padding: 35px 20px; text-align: center; }
            .header h1 { margin: 0; color: #ffffff; font-size: 22px; font-weight: 800; letter-spacing: 0.5px; text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2); }
            .header p { margin: 10px 0 0; color: rgba(255, 255, 255, 0.9); font-size: 14px; }
            .content { padding: 30px; }
            .status-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; background-color: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
            .details-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; background-color: rgba(0, 0, 0, 0.2); border-radius: 8px; overflow: hidden; }
            .details-table td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid #1f2833; }
            .details-table tr:last-child td { border-bottom: none; }
            .details-label { color: #ff6b6b; font-weight: 600; width: 35%; }
            .details-value { color: #ffffff; font-family: monospace; font-size: 13px; word-break: break-all; }
            .btn-container { text-align: center; margin-top: 30px; }
            .btn { display: inline-block; padding: 14px 32px; background: linear-gradient(135deg, #ef4444, #c53030); color: #ffffff !important; text-decoration: none; font-weight: 700; border-radius: 30px; font-size: 14px; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); text-transform: uppercase; }
            .footer { text-align: center; padding: 20px; font-size: 11px; color: #45a29e; border-top: 1px solid #1f2833; background-color: #0a0b0f; }
          </style>
        </head>
        <body>
          <div class="container">
            <div class="header">
              <h1>❌ APPLICATION SYNC FAILED</h1>
              <p>Deployment failed for application <strong>{{.app.metadata.name}}</strong>.</p>
            </div>
            <div class="content">
              <div style="text-align: center;">
                <span class="status-badge">FAILED &amp; UNHEALTHY</span>
              </div>
              <table class="details-table">
                <tr>
                  <td class="details-label">Sync Status</td>
                  <td class="details-value" style="color: #ef4444; font-weight: bold;">{{.app.status.sync.status}}</td>
                </tr>
                <tr>
                  <td class="details-label">Health Status</td>
                  <td class="details-value" style="color: #ef4444; font-weight: bold;">{{.app.status.health.status}}</td>
                </tr>
                <tr>
                  <td class="details-label">Target Revision</td>
                  <td class="details-value">{{.app.spec.source.targetRevision}}</td>
                </tr>
                <tr>
                  <td class="details-label">Cluster</td>
                  <td class="details-value">{{.app.spec.destination.server}}</td>
                </tr>
                <tr>
                  <td class="details-label">Namespace</td>
                  <td class="details-value">{{.app.spec.destination.namespace}}</td>
                </tr>
              </table>
              <div class="btn-container">
                <a href="{{.context.argocdUrl}}/applications/{{.app.metadata.name}}" class="btn">View Failure Details</a>
              </div>
            </div>
            <div class="footer">
              Automated GitOps notification from Argo CD Server
            </div>
          </div>
        </body>
        </html>

  template.app-health-degraded: |
    email:
      subject: "⚠️ [ArgoCD] App '{{.app.metadata.name}}' is DEGRADED!"
      html: |
        <!DOCTYPE html>
        <html>
        <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <style>
            body { margin: 0; padding: 0; background-color: #0b0c10; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #c5c6c7; }
            .container { max-width: 600px; margin: 40px auto; background: linear-gradient(145deg, #1f2833, #151a21); border: 1px solid #1f2833; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }
            .header { background: linear-gradient(135deg, #f59e0b, #d97706); padding: 35px 20px; text-align: center; }
            .header h1 { margin: 0; color: #ffffff; font-size: 22px; font-weight: 800; letter-spacing: 0.5px; text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2); }
            .header p { margin: 10px 0 0; color: rgba(255, 255, 255, 0.9); font-size: 14px; }
            .content { padding: 30px; }
            .status-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; background-color: rgba(245, 158, 11, 0.15); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
            .details-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; background-color: rgba(0, 0, 0, 0.2); border-radius: 8px; overflow: hidden; }
            .details-table td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid #1f2833; }
            .details-table tr:last-child td { border-bottom: none; }
            .details-label { color: #f59e0b; font-weight: 600; width: 35%; }
            .details-value { color: #ffffff; font-family: monospace; font-size: 13px; word-break: break-all; }
            .btn-container { text-align: center; margin-top: 30px; }
            .btn { display: inline-block; padding: 14px 32px; background: linear-gradient(135deg, #f59e0b, #d97706); color: #0b0c10 !important; text-decoration: none; font-weight: 700; border-radius: 30px; font-size: 14px; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); text-transform: uppercase; }
            .footer { text-align: center; padding: 20px; font-size: 11px; color: #45a29e; border-top: 1px solid #1f2833; background-color: #0a0b0f; }
          </style>
        </head>
        <body>
          <div class="container">
            <div class="header">
              <h1>⚠️ APPLICATION IS DEGRADED</h1>
              <p>Application <strong>{{.app.metadata.name}}</strong> health status is degraded.</p>
            </div>
            <div class="content">
              <div style="text-align: center;">
                <span class="status-badge">DEGRADED</span>
              </div>
              <table class="details-table">
                <tr>
                  <td class="details-label">Sync Status</td>
                  <td class="details-value" style="font-weight: bold;">{{.app.status.sync.status}}</td>
                </tr>
                <tr>
                  <td class="details-label">Health Status</td>
                  <td class="details-value" style="color: #f59e0b; font-weight: bold;">{{.app.status.health.status}}</td>
                </tr>
                <tr>
                  <td class="details-label">Target Revision</td>
                  <td class="details-value">{{.app.spec.source.targetRevision}}</td>
                </tr>
                <tr>
                  <td class="details-label">Cluster</td>
                  <td class="details-value">{{.app.spec.destination.server}}</td>
                </tr>
                <tr>
                  <td class="details-label">Namespace</td>
                  <td class="details-value">{{.app.spec.destination.namespace}}</td>
                </tr>
              </table>
              <div class="btn-container">
                <a href="{{.context.argocdUrl}}/applications/{{.app.metadata.name}}" class="btn">Debug Degraded App</a>
              </div>
            </div>
            <div class="footer">
              Automated GitOps notification from Argo CD Server
            </div>
          </div>
        </body>
        </html>