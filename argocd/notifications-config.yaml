apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
data:
  # ─── GMAIL SMTP SERVICE INTEGRATION ──────────────────────────────
  service.email: |
    host: smtp.gmail.com
    port: 587
    from: ritishhire179@gmail.com
    username: ritishhire179@gmail.com
    password: $email-password

  # ─── TRIGGER CONDITIONS ─────────────────────────────────────────
  trigger.on-sync-succeeded: |
    - when: app.status.sync.status == 'Synced'
      send: [app-sync-succeeded]

  trigger.on-sync-failed: |
    - when: app.status.sync.status == 'Failed'
      send: [app-sync-failed]

  trigger.on-health-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [app-health-degraded]

  # ─── EMAIL NOTIFICATION TEMPLATES ──────────────────────────────
  template.app-sync-succeeded: |
    email:
      subject: "✅ App '{{.app.metadata.name}}' Synced Successfully"
      body: |
        Hi,

        The application '{{.app.metadata.name}}' has successfully synced.

        Details:
        - Sync Status: {{.app.status.sync.status}}
        - Health Status: {{.app.status.health.status}}
        - Target Revision: {{.app.spec.source.targetRevision}}
        - Cluster: {{.app.spec.destination.server}}
        - Namespace: {{.app.spec.destination.namespace}}

        View in ArgoCD Dashboard:
        {{.context.argocdUrl}}/applications/{{.app.metadata.name}}

        Regards,
        ArgoCD Notifications

  template.app-sync-failed: |
    email:
      subject: "❌ App '{{.app.metadata.name}}' Sync FAILED!"
      body: |
        Hi,

        The application '{{.app.metadata.name}}' has FAILED to sync.

        Details:
        - Sync Status: {{.app.status.sync.status}}
        - Health Status: {{.app.status.health.status}}

        Check details in the dashboard:
        {{.context.argocdUrl}}/applications/{{.app.metadata.name}}

        Regards,
        ArgoCD Notifications

  template.app-health-degraded: |
    email:
      subject: "⚠️ App '{{.app.metadata.name}}' is DEGRADED!"
      body: |
        Hi,

        The application '{{.app.metadata.name}}' health has DEGRADED.

        Details:
        - Health Status: {{.app.status.health.status}}
        - Reason: Pods are failing or service is unreachable.

        View details in the dashboard:
        {{.context.argocdUrl}}/applications/{{.app.metadata.name}}

        Regards,
        ArgoCD Notifications
