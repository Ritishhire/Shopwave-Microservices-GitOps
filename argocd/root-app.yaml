apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: default
  source:
    # ── YOUR GITHUB REPOSITORY ────────────────────────────────
    repoURL: https://github.com/Ritishhire/Shopwave-Microservices-GitOps.git
    targetRevision: main
    path: argocd/apps      # <--- This is where root-app looks for child apps!
  
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  
  syncPolicy:
    automated:
      prune: true          # Delete child apps if removed from Git
      selfHeal: true       # Fix any manual changes automatically
    syncOptions:
      - CreateNamespace=true
