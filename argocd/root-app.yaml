apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shopwave-root-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/Ritishhire/Shopwave-CloudNativeApplication-GitOps.git'
    targetRevision: main
    path: argocd/apps
    directory:
      recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
