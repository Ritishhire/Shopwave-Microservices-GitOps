apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shopwave
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: frontend=295435084247.dkr.ecr.ap-south-1.amazonaws.com/shopwave-frontend, backend=295435084247.dkr.ecr.ap-south-1.amazonaws.com/shopwave-backend
    argocd-image-updater.argoproj.io/frontend.update-strategy: latest
    argocd-image-updater.argoproj.io/backend.update-strategy: latest
    argocd-image-updater.argoproj.io/write-back-method: argocd
    notifications.argoproj.io/subscribe.on-deployed.github: ""
    notifications.argoproj.io/subscribe.on-health-degraded.github: ""
  # Cascade-delete all app resources when this Application is deleted.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: shopwave
    app.kubernetes.io/managed-by: argocd
spec:
  project: default

  # ── Source ────────────────────────────────────────────────────────────────
  source:
    repoURL: https://github.com/Ritishhire/Shopwave-Microservices-GitOps.git
    targetRevision: main
    path: helm/shopwave          # Path to the Helm chart inside the repo

    # Tell ArgoCD this is a Helm chart (not plain YAML).
    helm:
      releaseName: shopwave
      # Override values here if needed (leave empty to use values.yaml defaults).
      values: |
        global:
          namespace: shopwave

  # ── Destination ───────────────────────────────────────────────────────────
  destination:
    server: https://kubernetes.default.svc
    namespace: shopwave

  # ── Sync Policy ───────────────────────────────────────────────────────────
  syncPolicy:
    automated:
      prune: true        # Delete resources removed from Git
      selfHeal: true     # Re-sync if someone manually changes the cluster
      allowEmpty: false  # Never sync an empty app (safety guard)

    syncOptions:
      - CreateNamespace=true       # Auto-create the shopwave namespace
      - ServerSideApply=true       # Use server-side apply (handles larger objects)
      - PrunePropagationPolicy=foreground  # Wait for child resources to delete
      - PruneLast=true             # Prune only after new resources are healthy

    # Retry on transient failures (e.g. CRD not ready yet)
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m