apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
data:
  # ── SMTP Email Server ────────────────────────
  service.email: |
    host: smtp.gmail.com
    port: 587
    from: $email-username
    username: $email-username
    password: $email-password

  # ── ArgoCD server URL (for Details link) ─────
  context: |
    argocdUrl: http://3.7.252.13:8080

  # ── Email Templates ───────────────────────────
  template.app-sync-succeeded: |
    email:
      subject: "✅ ShopWave Deployment SUCCESS - {{.app.metadata.name}}"
    message: |
      ✅ Application: {{.app.metadata.name}}
      📦 Namespace: {{.app.spec.destination.namespace}}
      🔄 Sync status: {{.app.status.sync.status}}
      📌 Revision: {{.app.status.sync.revision}}
      ❤️ Health status: {{.app.status.health.status}}
      ⚙️ Last operation: {{.app.status.operationState.phase}}
      Finished at: {{.app.status.operationState.finishedAt}}
      🔗 Details: {{.context.argocdUrl}}/applications/{{.app.metadata.name}}

  template.app-sync-failed: |
    email:
      subject: "❌ ShopWave Deployment FAILED - {{.app.metadata.name}}"
    message: |
      ❌ Application: {{.app.metadata.name}}
      📦 Namespace: {{.app.spec.destination.namespace}}
      🔄 Sync status: {{.app.status.sync.status}}
      📌 Revision: {{.app.status.sync.revision}}
      💔 Health status: {{.app.status.health.status}}
      ⚙️ Last operation: {{.app.status.operationState.phase}}
      ⚠️ Message: {{.app.status.operationState.message}}
      🔗 Details: {{.context.argocdUrl}}/applications/{{.app.metadata.name}}

  template.app-health-degraded: |
    email:
      subject: "⚠️ ShopWave Health DEGRADED - {{.app.metadata.name}}"
    message: |
      ⚠️ Application: {{.app.metadata.name}}
      📦 Namespace: {{.app.spec.destination.namespace}}
      🔄 Sync status: {{.app.status.sync.status}}
      📌 Revision: {{.app.status.sync.revision}}
      💔 Health status: {{.app.status.health.status}}
      🔗 Details: {{.context.argocdUrl}}/applications/{{.app.metadata.name}}

  # ── Triggers ──────────────────────────────────
  trigger.on-sync-succeeded: |
    - when: app.status.operationState.phase in ['Succeeded']
      send: [app-sync-succeeded]

  trigger.on-sync-failed: |
    - when: app.status.operationState.phase in ['Error', 'Failed']
      send: [app-sync-failed]

  trigger.on-health-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [app-health-degraded]

  # ── Subscriptions (who gets email) ───────────
  subscriptions: |
    - recipients:
        - ritishhire179@gmail.com
      triggers:
        - on-sync-succeeded
        - on-sync-failed
        - on-health-degraded