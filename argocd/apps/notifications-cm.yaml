apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
data:
  # ─────────────────────────────────────────────
  # SMTP Service Configuration (Gmail)
  # ─────────────────────────────────────────────
  service.email: |
    host: smtp.gmail.com
    port: 587
    from: $email-username
    username: $email-username
    password: $email-password

  # ─────────────────────────────────────────────
  # Notification Templates
  # ─────────────────────────────────────────────
  template.app-sync-succeeded: |
    email:
      subject: "[ShopWave] Deployment Successful - {{.app.metadata.name}}"
    message: |
      Hello,

      Application "{{.app.metadata.name}}" deployed successfully.

      Project   : {{.app.spec.project}}
      Namespace : {{.app.spec.destination.namespace}}
      Revision  : {{.app.status.sync.revision}}
      Status    : {{.app.status.sync.status}}

  template.app-sync-failed: |
    email:
      subject: "[ShopWave] Deployment FAILED - {{.app.metadata.name}}"
    message: |
      Hello,

      Application "{{.app.metadata.name}}" failed to sync.

      Project   : {{.app.spec.project}}
      Namespace : {{.app.spec.destination.namespace}}
      Phase     : {{.app.status.operationState.phase}}
      Message   : {{.app.status.operationState.message}}

      Please check the ArgoCD UI for more details.

  template.app-health-degraded: |
    email:
      subject: "[ShopWave] Health DEGRADED - {{.app.metadata.name}}"
    message: |
      Hello,

      Application "{{.app.metadata.name}}" health is Degraded.

      Project   : {{.app.spec.project}}
      Namespace : {{.app.spec.destination.namespace}}
      Health    : {{.app.status.health.status}}

      One or more pods might be crashing.

  # ─────────────────────────────────────────────
  # Triggers (When to send notifications)
  # ─────────────────────────────────────────────
  trigger.on-sync-succeeded: |
    - when: app.status.operationState.phase in ['Succeeded']
      send: [app-sync-succeeded]

  trigger.on-sync-failed: |
    - when: app.status.operationState.phase in ['Error', 'Failed']
      send: [app-sync-failed]

  trigger.on-health-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [app-health-degraded]

  # ─────────────────────────────────────────────
  # Subscriptions (Who receives notifications, for all apps)
  # ─────────────────────────────────────────────
  subscriptions: |
    - recipients:
        - 23amtics301@gmail.com
      triggers:
        - on-sync-succeeded
        - on-sync-failed
        - on-health-degraded